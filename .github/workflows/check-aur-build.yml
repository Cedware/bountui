name: Check AUR Build
on:
  workflow_call:
jobs:
  check:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install prerequisites
        run: |
          pacman -Sy --noconfirm base-devel git nodejs rust dbus
          useradd -m builder
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
      - name: Run makepkg
        run: |
          mkdir -p /tmp/build/src/bountui-"${{ steps.version.outputs.version }}"
          cp -r . /tmp/build/src/bountui-"${{ steps.version.outputs.version }}"/
          cp PKGBUILD /tmp/build/PKGBUILD
          sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" /tmp/build/PKGBUILD
          sed -i "s/pkgrel=.*/pkgrel=1/" /tmp/build/PKGBUILD
          sed -i "s/sha256sums=.*/sha256sums=('SKIP')/" /tmp/build/PKGBUILD
          chown -R builder:builder /tmp/build
          cd /tmp/build
          runuser -u builder -- makepkg --noextract --nocheck
