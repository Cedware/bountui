name: Check AUR Build
on:
  workflow_call:
jobs:
  check:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install prerequisites
        run: |
          pacman -Sy --noconfirm base-devel git nodejs openssl dbus cargo
          useradd -m builder
      - name: Install Rust for builder
        run: |
          runuser -u builder -- curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
      - name: Run makepkg
        run: |
          mkdir -p /tmp/build/src/bountui-"${{ steps.version.outputs.version }}"
          cp -r . /tmp/build/src/bountui-"${{ steps.version.outputs.version }}"/
          cp PKGBUILD /tmp/build/PKGBUILD
          bash scripts/fill-pkgbuild.sh /tmp/build/PKGBUILD "${{ steps.version.outputs.version }}" 1 "" SKIP
          chown -R builder:builder /tmp/build
          cd /tmp/build
          runuser -u builder -- bash -c '
            export PATH="$HOME/.cargo/bin:$PATH"
            export RUSTUP_HOME="$HOME/.rustup"
            export CARGO_HOME="$HOME/.cargo"
            cd src/bountui-'"${{ steps.version.outputs.version }}"'
            cargo fetch --locked
            cd /tmp/build
            makepkg --noextract --nocheck
          '