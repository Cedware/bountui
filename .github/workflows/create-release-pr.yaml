name: Create Release PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
      - name: Create or update release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr=$(gh pr list --base main --head develop --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists, enabling auto-merge"
            gh pr merge --auto --merge "$existing_pr"
          else
            pr_url=$(gh pr create --base main --head develop --title "chore: release" --body "Automated release PR from develop into main")
            echo "Created PR: $pr_url"
            gh pr merge --auto --merge "$pr_url"
          fi
